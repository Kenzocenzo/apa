<!doctype html>
<html lang="pl-PL">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Baza danych</title>
        <link rel="stylesheet" href="../style/style.css" />
        <!-- <link rel="icon" href="../img/other/images.png" /> -->
    </head>
    <body>
        <pre class="sigma">Witaj Krzysztofie</pre>
        <div class="container">
            <pre id="notes">Nagrania</pre>
            <pre id="inters">Przesłuchania</pre>
        </div>

        <pre id="output"></pre>
        <div id="prompt"><span id="command-input"></span><span id="cursor" class="blink"></span></div>

        <div id="interlaced"></div>
        <div id="glare"></div>
        <script>
            var content = [];
            var list = [];
            const wait = (ms = 0) => new Promise((resolve) => setTimeout(resolve, ms));

            function writeText(target, content, delay = 200) {
                return new Promise((resolve) => {
                    console.log(content);
                    const contentArray = content.split("\n");

                    let current = 0;

                    while (current < contentArray.length) {
                        ((curr) => {
                            setTimeout(() => {
                                target.innerHTML += contentArray[curr] + "<br>";

                                window.scrollTo(0, document.body.scrollHeight);

                                if (curr === contentArray.length - 1) resolve();
                            }, delay * curr);
                        })(current++);
                    }
                });
            }

            function handleKeypress(e, input, output) {
                function noInputHasFocus() {
                    const elements = ["INPUT", "TEXTAREA", "BUTTON"];
                    return elements.indexOf(document.activeElement.tagName) === -1;
                }

                if (noInputHasFocus) {
                    if (e.key === "Enter") {
                        const command = input.innerText;
                        input.innerHTML = "";

                        output.innerHTML += "<strong>" + command + "</strong>\n<br>";
                        writeText(output, execute(command));
                    } else if (e.key === "Backspace") {
                        input.innerHTML = input.innerHTML.substring(0, input.innerHTML.length - 1);
                    } else if (e.key != "Shift" && e.key != "Alt" && e.key != "Control" && e.key != "AltGraph")
                        input.insertAdjacentText("beforeend", e.key);
                }

                function execute(command) {
                    helper = false;
                    if (command == "") {
                        return `\n`;
                    }
                    list.forEach((el) => {
                        if (command == el) {
                            window.location.href = "/library/" + command;
                            helper = true;
                        }
                    });
                    if (command.toLowerCase() == "kocham cię") {
                        return "Ja Pana też!";
                    }
                    if (helper) return "Wpis znaleziono";
                    return "Brak odpowiedniego wpisu w bazie danych";
                }
            }

            document.addEventListener("DOMContentLoaded", async () => {
                await fetch(`/api/library`)
                    .then((res) => res.json())
                    .then((data) => {
                        content = data;
                    });
                const notes = document.getElementById("notes");
                const inters = document.getElementById("inters");
                let noteText = "\n";
                let interText = "\n";
                content.forEach((el) => {
                    list.push(el.id);
                    if (el.type == "note") noteText += "\n" + el.id + " - " + el.title + "\n";
                    else if (el.type == "inter") interText += "\n" + el.id + " - " + el.title + "\n";
                });
                await writeText(notes, noteText);
                await writeText(inters, interText);
                const prompt = document.getElementById("prompt");
                const cursor = document.getElementById("cursor");
                console.log(content);
                prompt.prepend(">");
                cursor.innerHTML = "_";

                const input = document.getElementById("command-input");
                const output = document.getElementById("output");
                document.addEventListener("keydown", (e) => handleKeypress(e, input, output));
            });
        </script>
    </body>
</html>
